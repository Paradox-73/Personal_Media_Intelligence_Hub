name: Daily Playlist

on:
  schedule:
    # 06:30 UTC every day. Adjust to taste (cron is in UTC).
    - cron: "30 6 * * *"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r daily_playlist/requirements.txt

      - name: Build playlist
        env:
          SPOTIPY_CLIENT_ID: ${{ secrets.SPOTIPY_CLIENT_ID }}
          SPOTIPY_CLIENT_SECRET: ${{ secrets.SPOTIPY_CLIENT_SECRET }}
          SPOTIPY_REDIRECT_URI: ${{ secrets.SPOTIPY_REDIRECT_URI }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_USER: ${{ secrets.LASTFM_USER }}
          # Optional overrides:
          PLAYLIST_NAME: ${{ vars.PLAYLIST_NAME }}
          PLAYLIST_SIZE: ${{ vars.PLAYLIST_SIZE }}
        run: python daily_playlist/daily_playlist.py
